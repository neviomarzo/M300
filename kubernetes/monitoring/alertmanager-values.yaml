alertmanager:
  alertmanagerSpec:
    secrets:
      - alertmanager-smtp
  config:
    global:
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'm300alert@gmail.com'
      smtp_auth_username: 'm300alert@gmail.com'
      smtp_auth_password_file: /etc/alertmanager/secrets/alertmanager-smtp/password
      smtp_require_tls: true
    route:
      group_by: ['alertname']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'email'
    receivers:
    - name: 'null'
    - name: 'email'
      email_configs:
      - to: 'nevio.marzo@edu.tbz.ch'