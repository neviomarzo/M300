apiVersion: v1
kind: ServiceAccount
metadata:
  name: cicd-deployer
  namespace: app-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cicd-deployer-role
  namespace: app-demo
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "update", "patch"]
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["get", "list"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cicd-deployer-binding
  namespace: app-demo
subjects:
- kind: ServiceAccount
  name: cicd-deployer
  namespace: app-demo
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: cicd-deployer-role